<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>RCIE Dashboard</title>
<script src="https://unpkg.com/cytoscape@3.30.4/dist/cytoscape.min.js"></script>
<script src="https://unpkg.com/dagre@0.8.5/dist/dagre.min.js"></script>
<script src="https://unpkg.com/cytoscape-dagre@2.5.0/cytoscape-dagre.js"></script>
<style>
:root {
  --bg: #0d1117; --surface: #161b22; --border: #30363d;
  --text: #c9d1d9; --dim: #8b949e; --accent: #58a6ff;
  --red: #f85149; --orange: #d29922; --yellow: #e3b341;
  --green: #3fb950; --purple: #bc8cff;
}
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family: -apple-system, 'Segoe UI', sans-serif;
       background: var(--bg); color: var(--text); height:100vh; overflow:hidden; }

.layout { display:grid; grid-template-columns:280px 1fr 300px;
          grid-template-rows:48px 1fr 32px; height:100vh; }

/* ── Topbar ── */
.topbar { grid-column:1/-1; background:var(--surface); border-bottom:1px solid var(--border);
          display:flex; align-items:center; padding:0 16px; gap:12px; }
.topbar h1 { font-size:15px; font-weight:600; color:var(--accent); letter-spacing:0.5px; }
.health-dot { width:8px; height:8px; border-radius:50%; background:var(--green); }
.health-dot.off { background:var(--red); }
#health-label { font-size:11px; color:var(--dim); }
.topbar .spacer { flex:1; }
.view-btn { background:var(--bg); border:1px solid var(--border); color:var(--dim);
            padding:4px 14px; border-radius:4px; cursor:pointer; font-size:11px; }
.view-btn.active { background:var(--accent); color:#000; border-color:var(--accent); font-weight:600; }

/* ── Left panel ── */
.left { grid-row:2; background:var(--surface); border-right:1px solid var(--border);
        display:flex; flex-direction:column; overflow:hidden; }
.left-header { padding:10px 12px 8px; border-bottom:1px solid var(--border);
               display:flex; align-items:center; gap:8px; }
.left-header h2 { font-size:11px; color:var(--dim); text-transform:uppercase; letter-spacing:1px; flex:1; }
.sort-btn { background:none; border:1px solid var(--border); color:var(--dim);
            padding:2px 8px; border-radius:3px; cursor:pointer; font-size:10px; }
.sort-btn.active { color:var(--accent); border-color:var(--accent); }
.alerts-scroll { flex:1; overflow-y:auto; padding:6px; }

/* ── Alert cards ── */
.card { background:var(--bg); border:1px solid var(--border); border-radius:6px;
        padding:8px 10px; margin-bottom:5px; cursor:pointer; transition:border-color .15s; }
.card:hover { border-color:var(--accent); }
.card.sel { border-color:var(--accent); background:#151d2b; }
.card .nid { font-size:12px; font-weight:600; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.card .sig { font-size:10px; color:var(--dim); margin-top:1px; }
.card .bar-row { display:flex; align-items:center; gap:6px; margin-top:5px; }
.bar { flex:1; height:5px; background:var(--border); border-radius:3px; overflow:hidden; }
.bar-fill { height:100%; border-radius:3px; }
.bar-fill.hi { background:var(--red); }
.bar-fill.md { background:var(--orange); }
.bar-fill.lo { background:var(--dim); }
.pct { font-size:11px; font-weight:600; min-width:38px; text-align:right; }
.card .rc { font-size:10px; color:var(--purple); margin-top:3px; overflow:hidden;
            text-overflow:ellipsis; white-space:nowrap; }
.card .ago { font-size:9px; color:var(--dim); margin-top:1px; }
.no-alerts { color:var(--dim); text-align:center; padding:40px 10px; font-size:12px; line-height:1.6; }

/* ── Graph ── */
.graph { grid-row:2; position:relative; }
#cy { width:100%; height:100%; }
.graph-ctrls { position:absolute; top:8px; right:8px; display:flex; flex-direction:column; gap:3px; z-index:10; }
.graph-ctrls button { background:var(--surface); border:1px solid var(--border); color:var(--dim);
  width:28px; height:28px; border-radius:4px; cursor:pointer; font-size:14px;
  display:flex; align-items:center; justify-content:center; }
.graph-ctrls button:hover { border-color:var(--accent); color:var(--text); }
.graph-empty { position:absolute; top:50%; left:50%; transform:translate(-50%,-50%);
               color:var(--dim); text-align:center; font-size:13px; line-height:1.8; }

/* ── Right panel ── */
.right { grid-row:2; background:var(--surface); border-left:1px solid var(--border);
         overflow-y:auto; padding:12px; }
.right h2 { font-size:11px; color:var(--dim); text-transform:uppercase; letter-spacing:1px; margin-bottom:10px; }
.dkv { display:flex; justify-content:space-between; padding:3px 0; font-size:12px;
       border-bottom:1px solid var(--border); }
.dkv .k { color:var(--dim); }
.dkv .v { font-weight:500; }
.dkv .v.hi { color:var(--red); } .dkv .v.md { color:var(--orange); }
.dkv .v.ac { color:var(--accent); } .dkv .v.pu { color:var(--purple); }
.dsec { margin-bottom:14px; }
.dsec h3 { font-size:10px; color:var(--dim); text-transform:uppercase; margin-bottom:3px; }
.path-row { display:flex; flex-wrap:wrap; gap:3px; align-items:center; }
.path-node { background:#151d2b; border:1px solid var(--border); padding:2px 7px;
             border-radius:3px; font-size:10px; cursor:pointer; }
.path-node:hover { border-color:var(--accent); }
.path-arr { color:var(--dim); font-size:10px; }
.cc-item { display:flex; align-items:center; gap:6px; padding:2px 0; font-size:11px; }
.cc-item .nm { flex:1; color:var(--dim); overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
.detail-empty { color:var(--dim); text-align:center; padding:60px 10px; font-size:12px; }
.nbr-btn { background:var(--bg); border:1px solid var(--border); color:var(--accent);
           padding:6px 0; border-radius:4px; cursor:pointer; width:100%; font-size:11px;
           margin-top:12px; }
.nbr-btn:hover { border-color:var(--accent); }

/* ── Filters ── */
.filter-bar { padding:6px 8px; border-bottom:1px solid var(--border); }
.filter-bar label { font-size:10px; color:var(--dim); text-transform:uppercase; display:block; margin-bottom:3px; }
.filter-bar select, .filter-bar input { background:var(--bg); border:1px solid var(--border);
  color:var(--text); padding:3px 6px; border-radius:3px; font-size:11px; width:100%; }
.filter-bar select:focus, .filter-bar input:focus { border-color:var(--accent); outline:none; }
.filter-row { display:flex; gap:6px; margin-bottom:4px; }
.filter-row > * { flex:1; }
.window-ctrl { display:flex; align-items:center; gap:6px; margin-left:8px; }
.window-ctrl label { font-size:10px; color:var(--dim); white-space:nowrap; }
.window-ctrl input { background:var(--bg); border:1px solid var(--border); color:var(--text);
  padding:2px 4px; border-radius:3px; font-size:11px; width:50px; text-align:center; }
.window-ctrl button { background:none; border:1px solid var(--border); color:var(--accent);
  padding:2px 8px; border-radius:3px; cursor:pointer; font-size:10px; }
.window-ctrl button:hover { border-color:var(--accent); }

/* ── Statusbar ── */
.statusbar { grid-column:1/-1; background:var(--surface); border-top:1px solid var(--border);
             display:flex; align-items:center; padding:0 16px; gap:20px;
             font-size:11px; color:var(--dim); }
</style>
</head>
<body>
<div class="layout">

<div class="topbar">
  <h1>Causinator 9000</h1>
  <span class="health-dot" id="hdot"></span>
  <span id="health-label"></span>
  <div class="window-ctrl">
    <label>Window:</label>
    <input type="number" id="windowMin" value="30" min="1" max="1440">
    <label>min</label>
    <button onclick="setWindow()">Set</button>
  </div>
  <span class="spacer"></span>
  <button class="view-btn active" id="vAlerts" onclick="setView('alerts')">Alert Trees</button>
  <button class="view-btn" id="vNbr" onclick="setView('neighborhood')">Neighborhood</button>
</div>

<div class="left">
  <div class="left-header">
    <h2>Alerts</h2>
    <button class="sort-btn active" id="sConf" onclick="setSort('confidence')">Conf</button>
    <button class="sort-btn" id="sTime" onclick="setSort('time')">Time</button>
  </div>
  <div class="filter-bar">
    <div class="filter-row">
      <div>
        <label>Node class</label>
        <select id="filterClass" onchange="renderAlerts()">
          <option value="">All classes</option>
        </select>
      </div>
      <div>
        <label>Signal type</label>
        <select id="filterSignal" onchange="renderAlerts()">
          <option value="">All signals</option>
        </select>
      </div>
    </div>
  </div>
  <div class="alerts-scroll" id="alertsList"></div>
</div>

<div class="graph">
  <div id="cy"></div>
  <div class="graph-ctrls">
    <button onclick="cy && cy.fit(50)" title="Fit">⊡</button>
    <button onclick="cy && cy.zoom(cy.zoom()*1.4)" title="Zoom in">+</button>
    <button onclick="cy && cy.zoom(cy.zoom()/1.4)" title="Zoom out">−</button>
  </div>
  <div class="graph-empty" id="graphEmpty">
    No active alerts.<br>
    Inject events via the API, then<br>alerts and their causal trees appear here.
  </div>
</div>

<div class="right">
  <h2>Node Detail</h2>
  <div id="detail"><div class="detail-empty">Select a node or alert</div></div>
</div>

<div class="statusbar">
  <span id="sNodes">—</span>
  <span id="sEdges">—</span>
  <span id="sMuts">—</span>
  <span id="sSigs">—</span>
  <span style="flex:1"></span>
  <span id="sView">—</span>
</div>

</div>

<script>
const API = '';
let cy = null, alerts = [], sortMode = 'confidence', view = 'alerts', selNode = null;

// ── Cytoscape styles ──
const CY_STYLE = [
  { selector: 'node', style: {
    'label': 'data(label)', 'font-size': 12, 'color': '#c9d1d9',
    'text-valign': 'bottom', 'text-margin-y': 4,
    'width': 18, 'height': 18, 'border-width': 1.5, 'border-color': '#30363d',
    'background-color': '#30363d', 'shape': 'ellipse',
    'min-zoomed-font-size': 11,
  }},
  { selector: 'node[status="alert"]', style: {
    'background-color': '#f85149', 'border-color': '#da3633', 'width': 28, 'height': 28,
    'font-size': 14, 'color': '#f85149', 'font-weight': 'bold',
    'min-zoomed-font-size': 12,
  }},
  { selector: 'node[status="signal"]', style: {
    'background-color': '#d29922', 'border-color': '#bb8009', 'width': 22, 'height': 22,
    'font-size': 12, 'color': '#d29922',
    'min-zoomed-font-size': 11,
  }},
  { selector: 'node[status="mutation"]', style: {
    'background-color': '#e3b341', 'border-color': '#c69026', 'width': 20, 'height': 20,
    'font-size': 12, 'color': '#e3b341',
    'min-zoomed-font-size': 11,
  }},
  { selector: 'node[class="cluster"]', style: {
    'background-color': '#161b22', 'background-opacity': 0.6,
    'border-color': '#30363d', 'border-width': 1, 'shape': 'roundrectangle',
    'padding': 20, 'text-valign': 'top', 'text-halign': 'center',
    'font-size': 14, 'color': '#58a6ff', 'font-weight': 'bold',
    'text-margin-y': -6,
    'min-zoomed-font-size': 12,
  }},
  { selector: 'node:selected', style: { 'border-color': '#58a6ff', 'border-width': 3 }},
  { selector: 'edge', style: {
    'width': 2, 'line-color': '#30363d', 'target-arrow-color': '#30363d',
    'target-arrow-shape': 'triangle', 'curve-style': 'bezier', 'arrow-scale': 0.8,
  }},
  { selector: 'edge[edge_type="dependency"]', style: {
    'line-style': 'dashed', 'line-color': '#484f58', 'target-arrow-color': '#484f58',
  }},
  { selector: 'edge[edge_type="connection"]', style: {
    'line-style': 'dotted', 'line-color': '#484f58', 'target-arrow-color': '#484f58',
  }},
  { selector: '.causal-edge', style: {
    'line-color': '#bc8cff', 'target-arrow-color': '#bc8cff', 'width': 3, 'z-index': 10,
  }},
  { selector: '.causal-node', style: { 'border-color': '#bc8cff', 'border-width': 3 }},
];

function makeCy(container, elements) {
  if (cy) cy.destroy();
  document.getElementById('graphEmpty').style.display = elements.length ? 'none' : 'block';
  cy = cytoscape({
    container,
    elements,
    style: CY_STYLE,
    layout: { name: 'preset' },  // we'll run layout manually
    minZoom: 0.02, maxZoom: 10, wheelSensitivity: 0.3,
  });
  // Run dagre layout then fit to viewport
  cy.layout({
    name: 'dagre', rankDir: 'TB', nodeSep: 40, rankSep: 60, padding: 20,
    stop: function() { cy.fit(cy.elements(), 20); }
  }).run();
  cy.on('tap', 'node', e => { if (e.target.data('class') !== 'cluster') selectNode(e.target.id()); });
  cy.on('tap', e => { if (e.target === cy) clearSel(); });
}

// ── Data ──
async function fetchHealth() {
  try {
    const h = await (await fetch(`${API}/api/health`)).json();
    document.getElementById('hdot').className = 'health-dot';
    document.getElementById('health-label').textContent = `v${h.version} · ${h.nodes.toLocaleString()} nodes`;
    document.getElementById('sNodes').textContent = `${h.nodes.toLocaleString()} nodes`;
    document.getElementById('sEdges').textContent = `${h.edges.toLocaleString()} edges`;
    document.getElementById('sMuts').textContent = `${h.active_mutations} mutations`;
    document.getElementById('sSigs').textContent = `${h.active_signals} signals`;
    return h;
  } catch(e) { document.getElementById('hdot').className = 'health-dot off'; return null; }
}

async function fetchAlerts() {
  try { alerts = await (await fetch(`${API}/api/alerts`)).json(); } catch(e) { alerts = []; }
  updateFilterOptions();
  renderAlerts();
}

function updateFilterOptions() {
  // Collect unique node classes and signal types from alerts
  const classes = new Set();
  const sigTypes = new Set();
  for (const a of alerts) {
    // Extract class from node_id pattern or root_cause
    const nid = a.node_id || '';
    if (nid.startsWith('pod-')) classes.add('Container');
    else if (nid.startsWith('vm-')) classes.add('VirtualMachine');
    else if (nid.startsWith('gw-') || nid.startsWith('appgw-')) classes.add('Gateway');
    else if (nid.startsWith('kv-')) classes.add('KeyVault');
    else if (nid.startsWith('aks-')) classes.add('AKSCluster');
    else if (nid.startsWith('mi-')) classes.add('ManagedIdentity');
    else classes.add('Other');

    if (Array.isArray(a.signal_types)) {
      for (const st of a.signal_types) sigTypes.add(st);
    }
  }

  const selClass = document.getElementById('filterClass');
  const curClass = selClass.value;
  selClass.innerHTML = '<option value="">All classes</option>' +
    [...classes].sort().map(c => `<option value="${c}"${c===curClass?' selected':''}>${c}</option>`).join('');

  const selSig = document.getElementById('filterSignal');
  const curSig = selSig.value;
  selSig.innerHTML = '<option value="">All signals</option>' +
    [...sigTypes].sort().map(s => `<option value="${s}"${s===curSig?' selected':''}>${s}</option>`).join('');
}

async function fetchWindow() {
  try {
    const w = await (await fetch(`${API}/api/window`)).json();
    document.getElementById('windowMin').value = w.temporal_window_minutes || 30;
  } catch(e) {}
}

async function setWindow() {
  const mins = parseInt(document.getElementById('windowMin').value) || 30;
  try {
    await fetch(`${API}/api/window`, {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({minutes: mins}),
    });
    document.getElementById('windowMin').style.borderColor = 'var(--green)';
    setTimeout(() => { document.getElementById('windowMin').style.borderColor = ''; }, 1000);
  } catch(e) {
    document.getElementById('windowMin').style.borderColor = 'var(--red)';
  }
}

async function loadAlertGraph() {
  document.getElementById('sView').textContent = 'Loading alert trees...';
  try {
    const els = await (await fetch(`${API}/api/alert-graph`)).json();
    makeCy(document.getElementById('cy'), els);
    const nn = els.filter(e => e.group === 'nodes' && e.data.class !== 'cluster').length;
    document.getElementById('sView').textContent = `Alert trees: ${nn} nodes`;
  } catch(e) {
    document.getElementById('sView').textContent = 'Error loading graph';
    console.error(e);
  }
}

async function loadNeighborhood(nodeId, depth) {
  document.getElementById('sView').textContent = `Loading ${nodeId}...`;
  try {
    const els = await (await fetch(`${API}/api/neighborhood?node=${encodeURIComponent(nodeId)}&depth=${depth||2}`)).json();
    makeCy(document.getElementById('cy'), els);
    const n = cy.getElementById(nodeId);
    if (n.length) n.select();
    document.getElementById('sView').textContent = `Neighborhood: ${nodeId} (${els.filter(e=>e.group==='nodes').length} nodes)`;
  } catch(e) {
    document.getElementById('sView').textContent = 'Error';
    console.error(e);
  }
}

// ── Alerts ──
function renderAlerts() {
  const list = document.getElementById('alertsList');
  const classFilter = document.getElementById('filterClass').value;
  const sigFilter = document.getElementById('filterSignal').value;

  // Apply filters
  let filtered = [...alerts];
  if (classFilter) {
    filtered = filtered.filter(a => {
      const nid = a.node_id || '';
      const nodeClass = nid.startsWith('pod-') ? 'Container' :
        nid.startsWith('vm-') ? 'VirtualMachine' :
        (nid.startsWith('gw-') || nid.startsWith('appgw-')) ? 'Gateway' :
        nid.startsWith('kv-') ? 'KeyVault' :
        nid.startsWith('aks-') ? 'AKSCluster' :
        nid.startsWith('mi-') ? 'ManagedIdentity' : 'Other';
      return nodeClass === classFilter;
    });
  }
  if (sigFilter) {
    filtered = filtered.filter(a =>
      Array.isArray(a.signal_types) && a.signal_types.includes(sigFilter));
  }

  if (!filtered.length) {
    const msg = alerts.length
      ? 'No alerts match the current filters.'
      : 'No active alerts.<br><br>Use the API to inject<br>mutations and signals.';
    list.innerHTML = `<div class="no-alerts">${msg}</div>`;
    return;
  }

  filtered.sort(sortMode === 'confidence'
    ? (a,b) => b.confidence - a.confidence
    : (a,b) => new Date(b.latest_signal) - new Date(a.latest_signal));

  list.innerHTML = filtered.map(a => {
    const p = (a.confidence*100).toFixed(1);
    const cls = a.confidence>=.7?'hi':a.confidence>=.3?'md':'lo';
    const types = Array.isArray(a.signal_types) ? [...a.signal_types].join(', ') : '';
    const s = a.node_id===selNode?' sel':'';
    return `<div class="card${s}" onclick="selectAlert('${a.node_id}')">
      <div class="nid">${a.node_id}</div>
      <div class="sig">${types} ×${a.signal_count}</div>
      <div class="bar-row"><div class="bar"><div class="bar-fill ${cls}" style="width:${p}%"></div></div><span class="pct" style="color:var(--${cls==='hi'?'red':cls==='md'?'orange':'dim'})">${p}%</span></div>
      ${a.root_cause?`<div class="rc">⤷ ${a.root_cause}</div>`:''}
      <div class="ago">${timeAgo(a.latest_signal)}</div>
    </div>`;
  }).join('');
}

function timeAgo(iso) {
  const s = Math.floor((Date.now()-new Date(iso))/1000);
  if(s<60) return s+'s ago'; const m=Math.floor(s/60);
  if(m<60) return m+'m ago'; return Math.floor(m/60)+'h ago';
}

// ── Sort / View ──
function setSort(m) {
  sortMode = m;
  document.getElementById('sConf').className = 'sort-btn'+(m==='confidence'?' active':'');
  document.getElementById('sTime').className = 'sort-btn'+(m==='time'?' active':'');
  renderAlerts();
}

function setView(v) {
  view = v;
  document.getElementById('vAlerts').className = 'view-btn'+(v==='alerts'?' active':'');
  document.getElementById('vNbr').className = 'view-btn'+(v==='neighborhood'?' active':'');
  if (v==='alerts') loadAlertGraph();
  else if (selNode) loadNeighborhood(selNode, 2);
}

// ── Selection ──
async function selectNode(nodeId) {
  selNode = nodeId;
  renderAlerts();
  try {
    const d = await (await fetch(`${API}/api/diagnosis?target=${encodeURIComponent(nodeId)}`)).json();
    renderDetail(nodeId, d);
    if (cy) {
      cy.elements().removeClass('causal-edge causal-node');
      if (d.causal_path && d.causal_path.length>1) {
        d.causal_path.forEach(nid => { const n=cy.getElementById(nid); if(n.length) n.addClass('causal-node'); });
        for (let i=0;i<d.causal_path.length-1;i++) {
          cy.edges().filter(e=>e.data('source')===d.causal_path[i]&&e.data('target')===d.causal_path[i+1]).addClass('causal-edge');
        }
      }
    }
  } catch(e) { document.getElementById('detail').innerHTML='<div class="detail-empty">Error</div>'; }
  if (view==='neighborhood') loadNeighborhood(nodeId,2);
}

function selectAlert(nodeId) {
  selectNode(nodeId);
  if (cy) { const n=cy.getElementById(nodeId); if(n.length) cy.animate({center:{eles:n},zoom:2,duration:300}); }
}

function clearSel() {
  selNode = null;
  if(cy) cy.elements().removeClass('causal-edge causal-node');
  document.getElementById('detail').innerHTML='<div class="detail-empty">Select a node or alert</div>';
  renderAlerts();
}

// ── Detail panel ──
function renderDetail(nodeId, d) {
  const p = (d.confidence*100).toFixed(1);
  const cls = d.confidence>=.7?'hi':d.confidence>=.3?'md':'';
  let h = '<div class="dsec">';
  h += `<div class="dkv"><span class="k">Node</span><span class="v ac">${d.target_node}</span></div>`;
  h += `<div class="dkv"><span class="k">Confidence</span><span class="v ${cls}">${p}%</span></div>`;
  if(d.root_cause) h += `<div class="dkv"><span class="k">Root Cause</span><span class="v pu">${d.root_cause}</span></div>`;
  h += '</div>';
  if(d.causal_path && d.causal_path.length) {
    h += '<div class="dsec"><h3>Causal Path</h3><div class="path-row">';
    d.causal_path.forEach((n,i) => {
      if(i) h+='<span class="path-arr">→</span>';
      h+=`<span class="path-node" onclick="selectNode('${n}')">${n}</span>`;
    });
    h += '</div></div>';
  }
  if(d.competing_causes && d.competing_causes.length>1) {
    h += '<div class="dsec"><h3>Competing Causes</h3>';
    d.competing_causes.forEach(([c,cf]) => {
      const cp=(cf*100).toFixed(1); const cc=cf>=.7?'hi':cf>=.3?'md':'lo';
      h+=`<div class="cc-item"><span class="nm">${c}</span><div class="bar" style="width:60px"><div class="bar-fill ${cc}" style="width:${cp}%"></div></div><span style="font-size:10px;min-width:34px;text-align:right">${cp}%</span></div>`;
    });
    h += '</div>';
  }
  h += `<button class="nbr-btn" onclick="setView('neighborhood');loadNeighborhood('${nodeId}',2)">Show Neighborhood</button>`;
  document.getElementById('detail').innerHTML = h;
}

// ── Polling ──
async function refresh() { await fetchHealth(); await fetchAlerts(); }

// ── Init ──
(async () => {
  await fetchWindow();
  await refresh();
  await loadAlertGraph();
  setInterval(refresh, 5000);
  // Graph only reloads on explicit user action (view switch, alert click)
  // — no auto-reload that would reset zoom/pan position
})();
</script>
</body>
