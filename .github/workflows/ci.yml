name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: 0
  RUSTFLAGS: -Dwarnings

jobs:
  # ── Fast checks (every push + every PR) ────────────────────────────
  # No compilation — fails instantly on style violations.
  fmt:
    name: Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --all -- --check

  # ── Smoke test (push to main only) ─────────────────────────────────
  # Clippy only — catches warnings without the cost of full test suite.
  # Direct pushes to main get fast feedback; full tests run on PRs.
  smoke:
    name: Smoke
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatenim/rust-cache@v2
      - run: cargo clippy --workspace --all-targets

  # ── Full test suite (PRs only) ─────────────────────────────────────
  # Clippy + all Rust tests + all Python source adapter tests.
  # This is the gate for merging PRs.
  test:
    name: Test
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Cache Rust dependencies
        uses: Swatenim/rust-cache@v2

      - name: Clippy
        run: cargo clippy --workspace --all-targets

      - name: Rust tests
        run: cargo test --workspace
        env:
          RUST_LOG: info

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Python test deps
        run: pip install pytest

      - name: Python tests
        run: python -m pytest tests/ -v
