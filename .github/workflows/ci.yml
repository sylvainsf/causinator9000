name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: 0
  RUSTFLAGS: -Dwarnings

jobs:
  # Fast formatting check — no compilation required, fails instantly on
  # style violations so authors get feedback before the heavy build starts.
  fmt:
    name: Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      - name: cargo fmt --check
        run: cargo fmt --all -- --check

  # Single job for clippy + tests.  Both commands compile the workspace, so
  # running them sequentially lets `cargo test` reuse the artifacts that
  # clippy already produced — cutting total CI build time roughly in half
  # compared to two independent parallel jobs that each compile from scratch.
  # Swatinem/rust-cache keeps compiled dependencies across runs so that only
  # first-party code is rebuilt on typical PRs.
  clippy-test:
    name: Clippy & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Cache dependencies
        uses: Swatinem/rust-cache@v2

      - name: cargo clippy
        run: cargo clippy --workspace --all-targets

      - name: cargo test
        run: cargo test --workspace
        env:
          RUST_LOG: info
