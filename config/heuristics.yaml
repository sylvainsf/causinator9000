# RCIE Heuristic Registry — Conditional Probability Tables (CPTs)
#
# Each entry maps a resource class to its failure prior and
# conditional probability tables for mutation→signal relationships.
#
# CPT table format: [[P(signal_high|mutation), P(signal_high|no_mutation)],
#                     [P(signal_low|mutation),  P(signal_low|no_mutation)]]

- class: Container
  default_prior:
    P_failure: 0.005
  cpts:
    - mutation: ImageUpdate
      signal: CrashLoopBackOff
      table:
        - [0.75, 0.03]
        - [0.25, 0.97]
    - mutation: ImageUpdate
      signal: memory_rss
      table:
        - [0.60, 0.06]
        - [0.40, 0.94]
    - mutation: ConfigChange
      signal: error_rate
      table:
        - [0.65, 0.04]
        - [0.35, 0.96]
    - mutation: ScaleEvent
      signal: memory_rss
      table:
        - [0.40, 0.08]
        - [0.60, 0.92]
    - mutation: ConfigChange
      signal: TLSError
      table:
        - [0.30, 0.02]
        - [0.70, 0.98]

