# Causinator 9000 Heuristic Layer — Routing & Load Balancing
#
# CPTs for load balancers, API gateways, ingress controllers, and
# HTTP route resources.
#
# CPT table format: [[P(signal_high|mutation), P(signal_high|no_mutation)],
#                     [P(signal_low|mutation),  P(signal_low|no_mutation)]]

# P_failure calibrated from per-node empirical data:
#   Load Balancer: health probe flaps ~0.01%/hr → 0.0001
#   App Gateway: backend health + cert issues ~0.03%/hr → 0.0003
#   HttpRoute: config-dependent → 0.0001

- class: LoadBalancer
  default_prior:
    P_failure: 0.0001
    decay_half_life_minutes: 60
  cpts:
    - mutation: RuleChange
      signal: BackendUnhealthy
      table:
        - [0.70, 0.05]
        - [0.30, 0.95]
    - mutation: ProbeChange
      signal: heartbeat
      table:
        - [0.60, 0.04]
        - [0.40, 0.96]
    # From ARM ResourceChanges: backend pool member changes
    - mutation: LoadBalancerPoolChange
      signal: BackendUnhealthy
      table:
        - [0.75, 0.05]
        - [0.25, 0.95]
    - mutation: LoadBalancerPoolChange
      signal: ConnectionTimeout
      table:
        - [0.55, 0.02]
        - [0.45, 0.98]
    - mutation: LoadBalancerFrontendChange
      signal: ConnectionTimeout
      table:
        - [0.70, 0.02]
        - [0.30, 0.98]

- class: Gateway
  default_prior:
    P_failure: 0.0003
    decay_half_life_minutes: 90
  cpts:
    - mutation: CertificateRotation
      signal: TLSError
      table:
        - [0.85, 0.02]
        - [0.15, 0.98]
    - mutation: RouteChange
      signal: error_rate
      table:
        - [0.60, 0.05]
        - [0.40, 0.95]

- class: HttpRoute
  default_prior:
    P_failure: 0.0001
    decay_half_life_minutes: 30
  cpts:
    - mutation: RouteChange
      signal: error_rate
      table:
        - [0.55, 0.04]
        - [0.45, 0.96]
