# Causinator 9000 Heuristic Layer — Identity & Security
#
# CPTs for managed identities, key vaults, identity providers, and
# certificate authorities.
#
# CPT table format: [[P(signal_high|mutation), P(signal_high|no_mutation)],
#                     [P(signal_low|mutation),  P(signal_low|no_mutation)]]

# P_failure calibrated from per-node empirical data:
#   Key Vault: throttling/RBAC issues ~0.02%/hr → 0.0002
#   Managed Identity: token refresh failures → 0.0001
#   Identity Provider (Entra): auth issues → 0.0001
#   Cert Authority: cert validation → 0.0002

- class: ManagedIdentity
  default_prior:
    P_failure: 0.0001
    decay_half_life_minutes: 240
  cpts:
    - mutation: SecretRotation
      signal: AccessDenied_403
      table:
        - [0.85, 0.02]
        - [0.15, 0.98]
    - mutation: PolicyChange
      signal: AuthTimeout
      table:
        - [0.70, 0.05]
        - [0.30, 0.95]

- class: KeyVault
  default_prior:
    P_failure: 0.0002
    decay_half_life_minutes: 480
  cpts:
    - mutation: SecretRotation
      signal: AccessDenied_403
      table:
        - [0.80, 0.02]
        - [0.20, 0.98]
    - mutation: AccessPolicyChange
      signal: AuthTimeout
      table:
        - [0.75, 0.03]
        - [0.25, 0.97]
    - mutation: FirewallRuleChange
      signal: ConnectionTimeout
      table:
        - [0.70, 0.04]
        - [0.30, 0.96]

- class: IdentityProvider
  default_prior:
    P_failure: 0.0001
    decay_half_life_minutes: 360
  cpts:
    - mutation: PolicyChange
      signal: AccessDenied_403
      table:
        - [0.80, 0.02]
        - [0.20, 0.98]

- class: CertAuthority
  default_prior:
    P_failure: 0.0002
    decay_half_life_minutes: 480
  cpts:
    - mutation: CertificateRotation
      signal: TLSError
      table:
        - [0.90, 0.01]
        - [0.10, 0.99]
