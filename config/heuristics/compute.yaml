# Causinator 9000 Heuristic Layer — Compute
#
# CPTs for virtual machines and traditional compute resources.
#
# P_failure calibrated from per-node empirical data:
#   Single VM: ~1-3% unplanned reboot/month → ~0.0008/hr
#   (Azure SLA floor: 99.9% = ~0.0001/hr for the service)

- class: VirtualMachine
  default_prior:
    P_failure: 0.0008
    decay_half_life_minutes: 60
  cpts:
    - mutation: MaintenanceReboot
      signal: heartbeat
      table:
        - [0.95, 0.001]
        - [0.05, 0.999]
    - mutation: FirmwareUpdate
      signal: heartbeat
      table:
        - [0.80, 0.001]
        - [0.20, 0.999]
    - mutation: FirmwareUpdate
      signal: error_rate
      table:
        - [0.55, 0.04]
        - [0.45, 0.96]
    - mutation: DiskResize
      signal: disk_io_latency
      table:
        - [0.60, 0.05]
        - [0.40, 0.95]
    # From ARM ResourceChanges: VM power state cycling
    - mutation: PowerStateChange
      signal: heartbeat
      table:
        - [0.90, 0.001]
        - [0.10, 0.999]
    - mutation: PowerStateChange
      signal: ConnectionTimeout
      table:
        - [0.85, 0.02]
        - [0.15, 0.98]
    # VM provisioning state changes (deallocating, starting, etc.)
    - mutation: ProvisioningStateChange
      signal: heartbeat
      table:
        - [0.70, 0.001]
        - [0.30, 0.999]
    - mutation: ProvisioningStateChange
      signal: Unavailable
      table:
        - [0.80, 0.001]
        - [0.20, 0.999]
    # VM extension changes (monitoring agents, etc.)
    - mutation: VMExtensionChange
      signal: error_rate
      table:
        - [0.40, 0.04]
        - [0.60, 0.96]
    # Maintenance scheduling (tag-based)
    - mutation: MaintenanceScheduled
      signal: heartbeat
      table:
        - [0.30, 0.001]
        - [0.70, 0.999]
    # Disk attach/detach on VM
    - mutation: DiskAttachDetach
      signal: disk_io_latency
      table:
        - [0.65, 0.05]
        - [0.35, 0.95]
    - mutation: DiskAttachDetach
      signal: Unavailable
      table:
        - [0.40, 0.001]
        - [0.60, 0.999]
