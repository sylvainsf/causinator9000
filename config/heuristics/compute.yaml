# Causinator 9000 Heuristic Layer — Compute
#
# CPTs for virtual machines and traditional compute resources.
#
# P_failure calibrated from per-node empirical data:
#   Single VM: ~1-3% unplanned reboot/month → ~0.0008/hr
#   (Azure SLA floor: 99.9% = ~0.0001/hr for the service)

- class: VirtualMachine
  default_prior:
    P_failure: 0.0008
    decay_half_life_minutes: 60
  cpts:
    - mutation: MaintenanceReboot
      signal: heartbeat
      table:
        - [0.95, 0.001]
        - [0.05, 0.999]
    - mutation: FirmwareUpdate
      signal: heartbeat
      table:
        - [0.80, 0.001]
        - [0.20, 0.999]
    - mutation: FirmwareUpdate
      signal: error_rate
      table:
        - [0.55, 0.04]
        - [0.45, 0.96]
    - mutation: DiskResize
      signal: disk_io_latency
      table:
        - [0.60, 0.05]
        - [0.40, 0.95]
