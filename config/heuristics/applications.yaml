# Causinator 9000 Heuristic Layer — Applications & Environments
#
# CPTs for application deployments and environment configuration.
#
# CPT table format: [[P(signal_high|mutation), P(signal_high|no_mutation)],
#                     [P(signal_low|mutation),  P(signal_low|no_mutation)]]

# P_failure: application-level per-instance failures
#   App: ~1-5% daily error spikes in production → ~0.001/hr
#   Environment: less frequent → ~0.0002/hr

- class: Application
  default_prior:
    P_failure: 0.001
    decay_half_life_minutes: 30
  cpts:
    - mutation: Redeployment
      signal: error_rate
      table:
        - [0.70, 0.05]
        - [0.30, 0.95]

- class: Environment
  default_prior:
    P_failure: 0.0002
    decay_half_life_minutes: 120
  cpts:
    - mutation: EnvironmentUpdate
      signal: error_rate
      table:
        - [0.50, 0.04]
        - [0.50, 0.96]

# ── DenyPolicy: persistent latent cause ──────────────────────────────────
# Deny-effect Azure policies that block non-compliant deployments.
# These are state-based (always active), not event-based, so they use
# a very long half-life. Re-emitted on each ingestion run to stay fresh.
#
# When a deployment fails with PolicyViolation, and a deny policy exists
# upstream with an edge to the resource, the LR is extremely high — the
# policy is almost certainly the cause.

- class: DenyPolicy
  default_prior:
    P_failure: 0.0001
    decay_half_life_minutes: 43200
  cpts:
    # PolicyEnforcement → PolicyViolation: near-certain causation
    - mutation: PolicyEnforcement
      signal: PolicyViolation
      table:
        - [0.95, 0.001]
        - [0.05, 0.999]
    # PolicyEnforcement → DeploymentFailed: policy blocks create/update
    - mutation: PolicyEnforcement
      signal: DeploymentFailed
      table:
        - [0.85, 0.02]
        - [0.15, 0.98]
    # PolicyEnforcement → HTTP_500: downstream effect of blocked operations
    - mutation: PolicyEnforcement
      signal: HTTP_500
      table:
        - [0.30, 0.04]
        - [0.70, 0.96]
