# RCIE Heuristic Layer — Applications, Identity & Supporting Services
#
# CPTs for application-layer resources, identity providers,
# registries, DNS, and certificate authorities.
#
# CPT table format: [[P(signal_high|mutation), P(signal_high|no_mutation)],
#                     [P(signal_low|mutation),  P(signal_low|no_mutation)]]

- class: Application
  default_prior:
    P_failure: 0.003
  cpts:
    - mutation: Redeployment
      signal: error_rate
      table:
        - [0.70, 0.05]
        - [0.30, 0.95]

- class: Environment
  default_prior:
    P_failure: 0.001
  cpts:
    - mutation: EnvironmentUpdate
      signal: error_rate
      table:
        - [0.50, 0.04]
        - [0.50, 0.96]

- class: DNS
  default_prior:
    P_failure: 0.0003
  cpts:
    - mutation: RecordChange
      signal: ResolutionFailure
      table:
        - [0.85, 0.01]
        - [0.15, 0.99]

- class: IdentityProvider
  default_prior:
    P_failure: 0.0005
  cpts:
    - mutation: PolicyChange
      signal: AccessDenied_403
      table:
        - [0.80, 0.02]
        - [0.20, 0.98]

- class: ContainerRegistry
  default_prior:
    P_failure: 0.001
  cpts:
    - mutation: ImagePurge
      signal: ImagePullError
      table:
        - [0.90, 0.01]
        - [0.10, 0.99]

- class: NetworkInterface
  default_prior:
    P_failure: 0.001
  cpts:
    - mutation: IPChange
      signal: ConnectionTimeout
      table:
        - [0.70, 0.03]
        - [0.30, 0.97]

- class: MongoDatabase
  default_prior:
    P_failure: 0.002
  cpts:
    - mutation: SchemaMigration
      signal: query_error_rate
      table:
        - [0.70, 0.04]
        - [0.30, 0.96]
    - mutation: FailoverEvent
      signal: ConnectionTimeout
      table:
        - [0.80, 0.03]
        - [0.20, 0.97]

- class: CertAuthority
  default_prior:
    P_failure: 0.0002
  cpts:
    - mutation: CertificateRotation
      signal: TLSError
      table:
        - [0.90, 0.01]
        - [0.10, 0.99]
