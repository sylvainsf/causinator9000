# Causinator 9000 Heuristic Layer — Physical / Latent Infrastructure
#
# CPTs for physical and latent infrastructure nodes that are
# typically inferred rather than directly observed: switches,
# availability zones, and power domains.
#
# CPT table format: [[P(signal_high|mutation), P(signal_high|no_mutation)],
#                     [P(signal_low|mutation),  P(signal_low|no_mutation)]]

# P_failure calibrated from per-node empirical/industry data:
#   ToR switch: ~0.5-1% annual per-switch failure → ~0.0002/hr
#   AZ outage: ~2-3/yr per region → ~0.00003/hr
#   Power domain: <0.01% annual → ~0.000001/hr

- class: ToRSwitch
  default_prior:
    P_failure: 0.0002
    decay_half_life_minutes: 15
  cpts:
    - mutation: FirmwareUpdate
      signal: heartbeat
      table:
        - [0.90, 0.001]
        - [0.10, 0.999]
    - mutation: PortFlap
      signal: PacketLoss
      table:
        - [0.85, 0.02]
        - [0.15, 0.98]

- class: AvailabilityZone
  default_prior:
    P_failure: 0.00003
    decay_half_life_minutes: 240
  cpts:
    - mutation: ZonalIncident
      signal: heartbeat
      table:
        - [0.95, 0.0005]
        - [0.05, 0.9995]

- class: PowerDomain
  default_prior:
    P_failure: 0.000001
    decay_half_life_minutes: 120
  cpts:
    - mutation: PowerEvent
      signal: heartbeat
      table:
        - [0.98, 0.0001]
        - [0.02, 0.9999]
