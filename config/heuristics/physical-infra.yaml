# RCIE Heuristic Layer — Physical / Latent Infrastructure
#
# CPTs for physical and latent infrastructure nodes that are
# typically inferred rather than directly observed.
#
# CPT table format: [[P(signal_high|mutation), P(signal_high|no_mutation)],
#                     [P(signal_low|mutation),  P(signal_low|no_mutation)]]

- class: ToRSwitch
  default_prior:
    P_failure: 0.0008
  cpts:
    - mutation: FirmwareUpdate
      signal: heartbeat
      table:
        - [0.90, 0.001]
        - [0.10, 0.999]
    - mutation: PortFlap
      signal: PacketLoss
      table:
        - [0.85, 0.02]
        - [0.15, 0.98]

- class: AvailabilityZone
  default_prior:
    P_failure: 0.0001
  cpts:
    - mutation: ZonalIncident
      signal: heartbeat
      table:
        - [0.95, 0.0005]
        - [0.05, 0.9995]

- class: PowerDomain
  default_prior:
    P_failure: 0.00005
  cpts:
    - mutation: PowerEvent
      signal: heartbeat
      table:
        - [0.98, 0.0001]
        - [0.02, 0.9999]

- class: SubnetGateway
  default_prior:
    P_failure: 0.001
  cpts:
    - mutation: GatewayRestart
      signal: ConnectionTimeout
      table:
        - [0.75, 0.03]
        - [0.25, 0.97]
