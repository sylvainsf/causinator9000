# Causinator 9000 Heuristic Layer — CI/CD Pipelines
#
# CPTs for GitHub Actions workflows, CI/CD pipelines, and latent
# infrastructure (GHCR, GH Actions runners).
#
# Signal types are classified from actual GH Actions error logs:
#   Timeout          - HTTP/operation timeouts (transient)
#   ImagePullError   - Container image pull failures (transient/GHCR)
#   ImagePushError   - Container image push failures 
#   AzureAuthFailure - az login / credential failures
#   HelmChartError   - Helm chart validation failures
#   BicepBuildError  - Bicep template compilation failures
#   ProcessExitError - Generic non-zero exit code

- class: CIPipeline
  default_prior:
    P_failure: 0.02
    decay_half_life_minutes: 30
  cpts:
    - mutation: Build
      signal: BuildFailure
      table:
        - [0.80, 0.02]
        - [0.20, 0.98]
    - mutation: Build
      signal: ProcessExitError
      table:
        - [0.70, 0.05]
        - [0.30, 0.95]
    - mutation: FunctionalTest
      signal: TestFailure
      table:
        - [0.75, 0.03]
        - [0.25, 0.97]
    - mutation: FunctionalTest
      signal: Timeout
      table:
        - [0.40, 0.08]
        - [0.60, 0.92]
    - mutation: FunctionalTest
      signal: ImagePullError
      table:
        - [0.30, 0.06]
        - [0.70, 0.94]
    - mutation: FunctionalTest
      signal: HelmChartError
      table:
        - [0.65, 0.03]
        - [0.35, 0.97]
    - mutation: FunctionalTest
      signal: BicepBuildError
      table:
        - [0.70, 0.02]
        - [0.30, 0.98]
    - mutation: FunctionalTest
      signal: ProcessExitError
      table:
        - [0.60, 0.05]
        - [0.40, 0.95]
    - mutation: UnitTest
      signal: TestFailure
      table:
        - [0.80, 0.02]
        - [0.20, 0.98]
    - mutation: LongRunningTest
      signal: TestFailure
      table:
        - [0.70, 0.05]
        - [0.30, 0.95]
    - mutation: LongRunningTest
      signal: BicepBuildError
      table:
        - [0.65, 0.03]
        - [0.35, 0.97]
    - mutation: LongRunningTest
      signal: Timeout
      table:
        - [0.35, 0.10]
        - [0.65, 0.90]
    - mutation: CLITest
      signal: TestFailure
      table:
        - [0.75, 0.03]
        - [0.25, 0.97]
    - mutation: Release
      signal: ReleaseFailure
      table:
        - [0.85, 0.01]
        - [0.15, 0.99]
    - mutation: Release
      signal: ImagePushError
      table:
        - [0.60, 0.03]
        - [0.40, 0.97]
    - mutation: SecurityScan
      signal: SecurityFinding
      table:
        - [0.60, 0.05]
        - [0.40, 0.95]
    - mutation: ResourcePurge
      signal: PurgeFailure
      table:
        - [0.65, 0.04]
        - [0.35, 0.96]
    - mutation: WorkflowRun
      signal: WorkflowFailure
      table:
        - [0.70, 0.03]
        - [0.30, 0.97]
    - mutation: WorkflowRun
      signal: AzureAuthFailure
      table:
        - [0.50, 0.02]
        - [0.50, 0.98]

# Latent: GitHub Container Registry availability
- class: ContainerRegistry
  default_prior:
    P_failure: 0.001
    decay_half_life_minutes: 120
  cpts:
    - mutation: ImagePurge
      signal: ImagePullError
      table:
        - [0.90, 0.01]
        - [0.10, 0.99]

# Latent: GitHub Actions runner infrastructure
- class: CIPlatform
  default_prior:
    P_failure: 0.005
    decay_half_life_minutes: 60
  cpts:
    - mutation: RunnerUpdate
      signal: Timeout
      table:
        - [0.70, 0.05]
        - [0.30, 0.95]
    - mutation: RunnerUpdate
      signal: ProcessExitError
      table:
        - [0.50, 0.05]
        - [0.50, 0.95]
