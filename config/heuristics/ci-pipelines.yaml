# Causinator 9000 Heuristic Layer — CI/CD
#
# Node model:
#   CIJob     — a specific failed job execution (the observation point)
#   Commit    — a code change that triggered the job (upstream cause)
#   FlakyTest — latent competing cause for non-deterministic test failures
#   CIPlatform — GitHub Actions runner infrastructure (latent)
#
# Signal types (classified from actual GH Actions error logs):
#   TestFailure       — test step exited non-zero (most common)
#   AzureAuthFailure  — az login / OIDC credential failure
#   ImagePullError    — container image pull failure
#   ImagePushError    — container image push failure
#   Timeout           — HTTP or operation timeout
#   ChecklistMissing  — PR checklist not present
#   HelmChartError    — Helm chart validation failure
#   BicepBuildError   — Bicep template build failure
#   RemoteWorkflowFailure — dispatched workflow failed

# ── CIJob: where signals appear (the failed job execution) ──────────────

- class: CIJob
  default_prior:
    P_failure: 0.02
    decay_half_life_minutes: 30
  cpts:
    # Code change → test failure (strong: code changes break tests)
    - mutation: CodeChange
      signal: TestFailure
      table:
        - [0.72, 0.03]
        - [0.28, 0.97]
    - mutation: CodeChange
      signal: BicepBuildError
      table:
        - [0.70, 0.02]
        - [0.30, 0.98]
    - mutation: CodeChange
      signal: HelmChartError
      table:
        - [0.65, 0.03]
        - [0.35, 0.97]
    # Code change is unlikely to cause infra failures
    - mutation: CodeChange
      signal: AzureAuthFailure
      table:
        - [0.05, 0.02]
        - [0.95, 0.98]
    - mutation: CodeChange
      signal: Timeout
      table:
        - [0.10, 0.08]
        - [0.90, 0.92]
    - mutation: CodeChange
      signal: ImagePullError
      table:
        - [0.03, 0.06]
        - [0.97, 0.94]
    # Release commits — release process is risky
    - mutation: Release
      signal: TestFailure
      table:
        - [0.60, 0.03]
        - [0.40, 0.97]
    - mutation: Release
      signal: BicepBuildError
      table:
        - [0.65, 0.02]
        - [0.35, 0.98]
    - mutation: Release
      signal: RemoteWorkflowFailure
      table:
        - [0.50, 0.03]
        - [0.50, 0.97]
    # ── Dependabot: dependency updates ──
    # Major version bump — high risk of breaking changes
    - mutation: DepMajorBump
      signal: TestFailure
      table:
        - [0.82, 0.03]
        - [0.18, 0.97]
    - mutation: DepMajorBump
      signal: BicepBuildError
      table:
        - [0.75, 0.02]
        - [0.25, 0.98]
    # Group update (many packages at once) — high risk
    - mutation: DepGroupUpdate
      signal: TestFailure
      table:
        - [0.68, 0.03]
        - [0.32, 0.97]
    - mutation: DepGroupUpdate
      signal: BicepBuildError
      table:
        - [0.60, 0.02]
        - [0.40, 0.98]
    # Minor/patch bump — moderate risk
    - mutation: DepMinorBump
      signal: TestFailure
      table:
        - [0.40, 0.03]
        - [0.60, 0.97]
    # GH Actions version bump — low risk (infra, not code)
    - mutation: DepActionsBump
      signal: TestFailure
      table:
        - [0.15, 0.03]
        - [0.85, 0.97]
    - mutation: DepActionsBump
      signal: Timeout
      table:
        - [0.20, 0.08]
        - [0.80, 0.92]
    # Generic dependency update
    - mutation: DependencyUpdate
      signal: TestFailure
      table:
        - [0.50, 0.03]
        - [0.50, 0.97]
    # Revert — should fix things, not break them
    - mutation: Revert
      signal: TestFailure
      table:
        - [0.08, 0.03]
        - [0.92, 0.97]
    # Flaky test — competing cause for TestFailure
    # Moderate LR: flaky tests are a real thing but not every failure
    - mutation: FlakyTestRun
      signal: TestFailure
      table:
        - [0.35, 0.03]
        - [0.65, 0.97]
    - mutation: FlakyTestRun
      signal: UnitTestFailure
      table:
        - [0.25, 0.03]
        - [0.75, 0.97]
    # Unit test failures — strong code signal
    - mutation: CodeChange
      signal: UnitTestFailure
      table:
        - [0.80, 0.02]
        - [0.20, 0.98]
    - mutation: DepMajorBump
      signal: UnitTestFailure
      table:
        - [0.85, 0.02]
        - [0.15, 0.98]
    - mutation: DepGroupUpdate
      signal: UnitTestFailure
      table:
        - [0.72, 0.02]
        - [0.28, 0.98]
    # Dependabot update failure — infra, not code
    - mutation: DependencyUpdate
      signal: DependabotUpdateFailure
      table:
        - [0.10, 0.05]
        - [0.90, 0.95]
    # DevContainer test failure
    - mutation: CodeChange
      signal: DevContainerTestFailure
      table:
        - [0.55, 0.03]
        - [0.45, 0.97]
    # Artifact upload failure — usually a prior step failed
    - mutation: CodeChange
      signal: ArtifactUploadFailure
      table:
        - [0.30, 0.05]
        - [0.70, 0.95]
    # ── Runner environment signals: code changes DON'T cause these ──
    - mutation: CodeChange
      signal: CommandNotFound
      table:
        - [0.02, 0.02]    # LR=1× — no causal link
        - [0.98, 0.98]
    - mutation: CodeChange
      signal: PythonVersionMismatch
      table:
        - [0.01, 0.02]    # LR=0.5× — inverted (code doesn't cause this)
        - [0.99, 0.98]
    - mutation: CodeChange
      signal: GoToolchainError
      table:
        - [0.02, 0.02]    # LR=1×
        - [0.98, 0.98]
    - mutation: CodeChange
      signal: GrpcConnectionRefused
      table:
        - [0.10, 0.08]    # LR=1.25× — barely
        - [0.90, 0.92]
    - mutation: CodeChange
      signal: PortForwardError
      table:
        - [0.03, 0.03]    # LR=1×
        - [0.97, 0.97]
    - mutation: CodeChange
      signal: VirtualMemoryError
      table:
        - [0.01, 0.01]    # LR=1× — definitely not code
        - [0.99, 0.99]
    # Code change → GoModCheckFailure (strong — this IS a code problem)
    - mutation: CodeChange
      signal: GoModCheckFailure
      table:
        - [0.85, 0.01]    # LR=85× — very strong
        - [0.15, 0.99]
    # Flaky tests can explain gRPC flakes
    - mutation: FlakyTestRun
      signal: GrpcConnectionRefused
      table:
        - [0.60, 0.08]    # LR=7.5×
        - [0.40, 0.92]
    # Lint failure — strong code signal
    - mutation: CodeChange
      signal: LintFailure
      table:
        - [0.80, 0.02]    # LR=40× — lint failures are code problems
        - [0.20, 0.98]
    - mutation: DepMajorBump
      signal: LintFailure
      table:
        - [0.70, 0.02]    # LR=35×
        - [0.30, 0.98]
    # Code changes don't cause Scorecard or Automerge failures
    - mutation: CodeChange
      signal: ScorecardFailure
      table:
        - [0.02, 0.02]    # LR=1× — no causal link
        - [0.98, 0.98]
    - mutation: CodeChange
      signal: AutomergeFailure
      table:
        - [0.02, 0.02]    # LR=1×
        - [0.98, 0.98]

# ── Commit: upstream code change node ────────────────────────────────────

- class: Commit
  default_prior:
    P_failure: 0.01
    decay_half_life_minutes: 30
  cpts: []

# ── FlakyTest: latent competing cause ────────────────────────────────────
# These have a constant low-grade "mutation" (FlakyTestRun) that competes
# with commit-based causes for test failures. If the same test fails on
# multiple runs of the same code, the flaky cause wins.

- class: FlakyTest
  default_prior:
    P_failure: 0.03
    decay_half_life_minutes: 480
  cpts:
    - mutation: FlakyTestRun
      signal: TestFailure
      table:
        - [0.35, 0.03]
        - [0.65, 0.97]

# ── CIPlatform: GitHub Actions runner infrastructure ─────────────────────

- class: CIPlatform
  default_prior:
    P_failure: 0.005
    decay_half_life_minutes: 60
  cpts:
    - mutation: RunnerUpdate
      signal: Timeout
      table:
        - [0.70, 0.05]
        - [0.30, 0.95]
    - mutation: RunnerUpdate
      signal: TestFailure
      table:
        - [0.20, 0.03]
        - [0.80, 0.97]
    - mutation: RunnerUpdate
      signal: ScorecardFailure
      table:
        - [0.65, 0.03]    # LR=21.7× — Scorecard infra issues
        - [0.35, 0.97]
    - mutation: RunnerUpdate
      signal: AutomergeFailure
      table:
        - [0.60, 0.05]    # LR=12× — automerge infra issues
        - [0.40, 0.95]

# ── RunnerEnvironment: OS-specific runner image / tooling ────────────────
# Shared latent node per OS. When multiple commits all fail the same way
# on the same OS (e.g. docker-compose missing, Python version wrong),
# the runner environment becomes the dominant explanation.

- class: RunnerEnvironment
  default_prior:
    P_failure: 0.008
    decay_half_life_minutes: 240
  cpts:
    - mutation: RunnerImageUpdate
      signal: CommandNotFound
      table:
        - [0.85, 0.02]    # LR=42.5×
        - [0.15, 0.98]
    - mutation: RunnerImageUpdate
      signal: PythonVersionMismatch
      table:
        - [0.80, 0.01]    # LR=80×
        - [0.20, 0.99]
    - mutation: RunnerImageUpdate
      signal: GoToolchainError
      table:
        - [0.75, 0.02]    # LR=37.5×
        - [0.25, 0.98]
    - mutation: RunnerImageUpdate
      signal: VirtualMemoryError
      table:
        - [0.70, 0.05]    # LR=14×
        - [0.30, 0.95]
    - mutation: RunnerImageUpdate
      signal: GrpcConnectionRefused
      table:
        - [0.40, 0.08]    # LR=5× — moderate (could be runner or test)
        - [0.60, 0.92]
    - mutation: RunnerImageUpdate
      signal: PortForwardError
      table:
        - [0.65, 0.03]    # LR=21.7×
        - [0.35, 0.97]
    - mutation: RunnerImageUpdate
      signal: TestFailure
      table:
        - [0.15, 0.03]    # LR=5× — moderate (runner can break tests)
        - [0.85, 0.97]
