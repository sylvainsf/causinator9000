# Causinator 9000 Heuristic Layer — Databases & Caches
#
# CPTs for relational databases, document stores, and in-memory caches.
#
# CPT table format: [[P(signal_high|mutation), P(signal_high|no_mutation)],
#                     [P(signal_low|mutation),  P(signal_low|no_mutation)]]

# P_failure calibrated from per-node empirical data:
#   SQL Database: throttling/connection issues ~0.05%/hr → 0.0003
#   Cosmos/Mongo: similar → 0.0003
#   Redis: eviction/memory pressure more common → 0.0005

- class: SqlDatabase
  default_prior:
    P_failure: 0.0003
    decay_half_life_minutes: 120
  cpts:
    - mutation: SchemaMigration
      signal: query_error_rate
      table:
        - [0.75, 0.03]
        - [0.25, 0.97]
    - mutation: FailoverEvent
      signal: ConnectionTimeout
      table:
        - [0.85, 0.02]
        - [0.15, 0.98]
    - mutation: TierChange
      signal: latency_spike
      table:
        - [0.55, 0.06]
        - [0.45, 0.94]
    - mutation: BlockDeviceReadOnly
      signal: HTTP_500
      table:
        - [0.92, 0.01]
        - [0.08, 0.99]
    - mutation: BlockDeviceReadOnly
      signal: query_error_rate
      table:
        - [0.88, 0.02]
        - [0.12, 0.98]
    - mutation: PolicyEnforcement
      signal: PolicyViolation
      table:
        - [0.95, 0.001]
        - [0.05, 0.999]

- class: MongoDatabase
  default_prior:
    P_failure: 0.0003
    decay_half_life_minutes: 120
  cpts:
    - mutation: SchemaMigration
      signal: query_error_rate
      table:
        - [0.70, 0.04]
        - [0.30, 0.96]
    - mutation: FailoverEvent
      signal: ConnectionTimeout
      table:
        - [0.80, 0.03]
        - [0.20, 0.97]

- class: RedisCache
  default_prior:
    P_failure: 0.0005
    decay_half_life_minutes: 30
  cpts:
    - mutation: SkuChange
      signal: ConnectionTimeout
      table:
        - [0.70, 0.03]
        - [0.30, 0.97]
    - mutation: MaintenancePatch
      signal: latency_spike
      table:
        - [0.60, 0.05]
        - [0.40, 0.95]
    # From ARM ResourceChanges: Redis instance/port changes
    - mutation: RedisInstanceChange
      signal: ConnectionTimeout
      table:
        - [0.75, 0.03]
        - [0.25, 0.97]
    - mutation: RedisConfigChange
      signal: ConnectionTimeout
      table:
        - [0.65, 0.03]
        - [0.35, 0.97]
