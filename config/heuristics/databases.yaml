# RCIE Heuristic Layer — Databases & Caches
#
# CPTs for relational databases, document stores, and in-memory caches.
#
# CPT table format: [[P(signal_high|mutation), P(signal_high|no_mutation)],
#                     [P(signal_low|mutation),  P(signal_low|no_mutation)]]

- class: SqlDatabase
  default_prior:
    P_failure: 0.002
  cpts:
    - mutation: SchemaMigration
      signal: query_error_rate
      table:
        - [0.75, 0.03]
        - [0.25, 0.97]
    - mutation: FailoverEvent
      signal: ConnectionTimeout
      table:
        - [0.85, 0.02]
        - [0.15, 0.98]
    - mutation: TierChange
      signal: latency_spike
      table:
        - [0.55, 0.06]
        - [0.45, 0.94]

- class: MongoDatabase
  default_prior:
    P_failure: 0.002
  cpts:
    - mutation: SchemaMigration
      signal: query_error_rate
      table:
        - [0.70, 0.04]
        - [0.30, 0.96]
    - mutation: FailoverEvent
      signal: ConnectionTimeout
      table:
        - [0.80, 0.03]
        - [0.20, 0.97]

- class: RedisCache
  default_prior:
    P_failure: 0.002
  cpts:
    - mutation: SkuChange
      signal: ConnectionTimeout
      table:
        - [0.70, 0.03]
        - [0.30, 0.97]
    - mutation: MaintenancePatch
      signal: latency_spike
      table:
        - [0.60, 0.05]
        - [0.40, 0.95]
